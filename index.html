<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SM OS · SM Soluciones</title>
<link rel="icon" type="image/png" href="assets/sm-logo.png">
<link rel="apple-touch-icon" href="assets/sm-logo.png">
<meta name="theme-color" content="#0B2547">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<script src="https://browser.sentry-cdn.com/8.47.0/bundle.min.js" crossorigin="anonymous"></script>
<script>
if(!window.supabase){
  document.write('<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"><\\/script>');
}
</script>
<link rel="stylesheet" href="assets/css/styles.css?v=2.4.0">

</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="lcard">
    <div class="llogo">
      <img src="assets/sm-logo.png" alt="SM Soluciones" style="width:130px;height:auto">
      <div class="lbrand">
        <div><span class="sm">SM</span><span class="sol">.SOLUCIONES</span></div>
        <div class="ltag">Inteligencia Comercial</div>
      </div>
    </div>
    <div class="lfield">
      <label>Selecciona tu nombre</label>
      <div id="user-sel"></div>
    </div>
    <div class="lfield" id="pin-wrap" style="display:none">
      <label id="pin-lbl">PIN</label>
      <input id="f-pin" type="password" placeholder="••••" maxlength="8" style="letter-spacing:4px;font-size:20px;text-align:center">
    </div>
    <div class="lerr" id="lerr"></div>
    <button class="lbtn" id="btn-login" style="display:none">Entrar al sistema</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <aside class="sidebar">
    <div class="sb-top">
      <div class="sb-logo">
        <img src="assets/sm-logo.png" alt="SM">
        <div class="sbt"><span class="sm2">SM OS</span><span class="os">Soluciones</span></div>
      </div>
    </div>
    <div class="nav-sec">
      <div class="nav-lbl">General</div>
      <button class="nbtn active" data-v="dashboard"><span class="ni"><i data-lucide="layout-grid"></i></span>Mis proyectos</button>
      <button class="nbtn" data-v="tareas"><span class="ni"><i data-lucide="circle-check-big"></i></span>Mis tareas</button>
      <button class="nbtn" data-v="alertas"><span class="ni"><i data-lucide="bell"></i></span>Alertas<span id="abadge" style="margin-left:auto;background:var(--red);border-radius:999px;padding:1px 7px;font-size:11px;font-weight:800;color:#fff;display:none">0</span></button>
      <button class="nbtn" data-v="ayuda"><span class="ni"><i data-lucide="life-buoy"></i></span>Ayuda / Manual</button>
    </div>
    <div class="nav-sec">
      <div class="nav-lbl">Proyectos</div>
      <div class="project-search"><i data-lucide="search"></i><input id="project-search-input" type="search" placeholder="Buscar proyecto" aria-label="Buscar proyecto"></div>
      <div id="project-nav"></div>
    </div>
    <div class="nav-sec" id="nav-admin" style="display:none">
      <div class="nav-lbl">Administración</div>
      <button class="nbtn" data-v="clientes"><span class="ni"><i data-lucide="building-2"></i></span>Clientes</button>
      <button class="nbtn" data-v="usuarios"><span class="ni"><i data-lucide="users"></i></span>Usuarios</button>
    </div>
    <div class="sb-foot">
      <div class="upill">
        <div class="av" id="sb-av">?</div>
        <div class="uinf"><div class="un" id="sb-n">—</div><div class="ur" id="sb-r">—</div></div>
        <button class="logoutbtn" id="btn-out" title="Cerrar sesión">⏻</button>
      </div>
    </div>
  </aside>
  <div class="main">
    <header class="topbar">
      <div class="tb-l">
        <button class="mobile-nav-toggle" type="button" onclick="toggleMobileNav()" aria-label="Abrir navegación"><i data-lucide="menu"></i></button>
        <div class="tb-ey" id="tb-ey">SM OS</div>
        <div class="tb-ti" id="tb-ti">Dashboard</div>
      </div>
      <div class="tb-r">
        <span class="chip" id="tb-date">—</span>
        <span class="chip" id="tb-user">—</span>
        <span class="chip" id="tb-live" style="color:var(--green);display:none">● En vivo</span>
        <button class="chip" id="btn-refresh-data" type="button" title="Actualizar datos de Supabase">Actualizar datos</button>
        <button class="chip" id="btn-reload-app" type="button" title="Forzar última versión publicada">Recargar app</button>
        <button class="chip topout" id="btn-out-top" type="button">Cerrar sesión</button>
      </div>
    </header>
    <main class="content" id="vc"></main>
  </div>
</div>

<div class="mbg" id="mbg">
  <div class="mbox" id="mbox">
    <div class="mhead"><h3 id="mtit">—</h3><button class="mcls" id="mcls">✕</button></div>
    <div class="mbody" id="mbody"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script src="assets/js/app.js?v=2.4.0" defer></script>

</body>
</html>
